openapi: 3.1.0
info:
  title: PHPSage API
  version: 0.1.0
  description: HTTP API for PHPSage run lifecycle and source exploration.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /api/ai/health:
    get:
      summary: AI health status
      responses:
        '200':
          description: AI integration health and active configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiHealthResponse'
  /api/ai/ingest:
    get:
      summary: List recent ingest jobs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [queued, running, completed, failed]
      responses:
        '200':
          description: Recent ingest jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiIngestJob'
        '400':
          description: Invalid status filter
    post:
      summary: Start asynchronous ingest job
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiIngestStartRequest'
      responses:
        '202':
          description: Ingest job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiIngestJob'
  /api/ai/ingest/{jobId}:
    get:
      summary: Get ingest job status by id
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ingest job found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiIngestJob'
        '404':
          description: Ingest job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/ingest/latest:
    get:
      summary: Get latest ingest job
      responses:
        '200':
          description: Most recent ingest job in current server lifecycle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiIngestJob'
        '404':
          description: Ingest job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/explain:
    post:
      summary: Explain PHPStan issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiExplainRequest'
      responses:
        '200':
          description: Explain result payload (fallback for now)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiExplainResponse'
        '400':
          description: Invalid explain payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/suggest-fix:
    post:
      summary: Suggest patch for PHPStan issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiSuggestFixRequest'
      responses:
        '200':
          description: Suggest-fix result payload (fallback for now)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiSuggestFixResponse'
        '400':
          description: Invalid suggest-fix payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs:
    get:
      summary: List run summaries
      responses:
        '200':
          description: List of runs sorted by creation date descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunSummary'
  /api/runs/start:
    post:
      summary: Start a new run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetPath]
              properties:
                targetPath:
                  type: string
                execute:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRecord'
        '400':
          description: Invalid target path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs/{runId}:
    get:
      summary: Get run detail by id
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRecord'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs/{runId}/log:
    post:
      summary: Append log line to run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stream, message]
              properties:
                stream:
                  type: string
                  enum: [stdout, stderr]
                message:
                  type: string
      responses:
        '200':
          description: Updated run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRecord'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs/{runId}/finish:
    post:
      summary: Mark run as finished
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [issues, exitCode]
              properties:
                issues:
                  type: array
                  items:
                    $ref: '#/components/schemas/RunIssue'
                exitCode:
                  type: integer
      responses:
        '200':
          description: Updated run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunRecord'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs/{runId}/source:
    get:
      summary: Read source file content for a run
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - in: query
          name: file
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Source content
          content:
            application/json:
              schema:
                type: object
                required: [file, content]
                properties:
                  file:
                    type: string
                  content:
                    type: string
        '400':
          description: Missing file query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Run or source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/runs/{runId}/files:
    get:
      summary: List files in run target with issue counters
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File list with issue counters
          content:
            application/json:
              schema:
                type: object
                required: [targetPath, files]
                properties:
                  targetPath:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      required: [path, issueCount, hasIssues]
                      properties:
                        path:
                          type: string
                        issueCount:
                          type: integer
                        hasIssues:
                          type: boolean
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AiHealthResponse:
      type: object
      required: [status, enabled, activeProvider, activeModel]
      properties:
        status:
          type: string
          enum: [ok]
        enabled:
          type: boolean
        activeProvider:
          type: string
          nullable: true
        activeModel:
          type: string
          nullable: true
    AiExplainRequest:
      type: object
      required: [issueMessage]
      properties:
        issueMessage:
          type: string
        issueIdentifier:
          type: string
        filePath:
          type: string
        line:
          type: integer
        sourceSnippet:
          type: string
    AiExplainResponse:
      type: object
      required: [explanation, recommendations, source, provider, fallbackReason, usage, debug]
      properties:
        explanation:
          type: string
        recommendations:
          type: array
          items:
            type: string
        source:
          type: string
          enum: [fallback]
        provider:
          type: string
        fallbackReason:
          type: string
        contextItems:
          type: array
          items:
            $ref: '#/components/schemas/AiRagContextItem'
        usage:
          type: 'null'
        debug:
          type: 'null'
    AiIngestStartRequest:
      type: object
      properties:
        targetPath:
          type: string
    AiIngestStats:
      type: object
      required: [filesIndexed, chunksIndexed]
      properties:
        filesIndexed:
          type: integer
        chunksIndexed:
          type: integer
    AiIngestJob:
      type: object
      required: [jobId, targetPath, status, createdAt, updatedAt, startedAt, finishedAt, error, stats]
      properties:
        jobId:
          type: string
        targetPath:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        stats:
          allOf:
            - $ref: '#/components/schemas/AiIngestStats'
          nullable: true
    AiSuggestFixRequest:
      type: object
      required: [issueMessage]
      properties:
        issueMessage:
          type: string
        issueIdentifier:
          type: string
        filePath:
          type: string
        line:
          type: integer
        sourceSnippet:
          type: string
    AiSuggestFixResponse:
      type: object
      required: [proposedDiff, rationale, source, provider, fallbackReason, usage, debug]
      properties:
        proposedDiff:
          type: string
        rationale:
          type: string
        source:
          type: string
          enum: [fallback]
        provider:
          type: string
        fallbackReason:
          type: string
        contextItems:
          type: array
          items:
            $ref: '#/components/schemas/AiRagContextItem'
        usage:
          type: 'null'
        debug:
          type: 'null'
    AiRagContextItem:
      type: object
      required: [sourcePath, identifier, content, score]
      properties:
        sourcePath:
          type: string
        identifier:
          type: string
          nullable: true
        content:
          type: string
        score:
          type: number
    RunIssue:
      type: object
      required: [file, line, message]
      properties:
        file:
          type: string
        line:
          type: integer
        message:
          type: string
        identifier:
          type: string
    RunLogEntry:
      type: object
      required: [timestamp, stream, message]
      properties:
        timestamp:
          type: string
          format: date-time
        stream:
          type: string
          enum: [stdout, stderr]
        message:
          type: string
    RunRecord:
      type: object
      required: [runId, targetPath, createdAt, updatedAt, status, logs, issues, exitCode]
      properties:
        runId:
          type: string
        targetPath:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [running, finished]
        logs:
          type: array
          items:
            $ref: '#/components/schemas/RunLogEntry'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/RunIssue'
        exitCode:
          type: integer
          nullable: true
    RunSummary:
      type: object
      required: [runId, targetPath, status, createdAt, updatedAt, exitCode, issueCount]
      properties:
        runId:
          type: string
        targetPath:
          type: string
        status:
          type: string
          enum: [running, finished]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        exitCode:
          type: integer
          nullable: true
        issueCount:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
