services:
  phpsage-cli:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: ["npm", "run", "build"]

  phpsage-server:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${PHPSAGE_ENV_FILE:-.env.example}
    depends_on:
      - qdrant
      - ollama
    working_dir: /workspace
    command: ["sh", "-lc", "npm run build && node apps/server/dist/index.js"]
    ports:
      - "8080:8080"

  phpsage-web:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: ["npm", "run", "dev", "--workspace", "@phpsage/web", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"

  api-docs:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/openapi.yaml:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  qdrant-data:
  ollama-data:
