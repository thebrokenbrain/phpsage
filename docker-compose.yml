services:
  phpsage-cli:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: ["npm", "run", "build"]

  phpsage-server:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${PHPSAGE_ENV_FILE:-.env.example}
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    working_dir: /workspace
    command: ["sh", "-lc", "npm run build && node apps/server/dist/index.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/healthz').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 20s
    ports:
      - "8080:8080"

  phpsage-web:
    image: phpsage-dev:latest
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      phpsage-server:
        condition: service_healthy
    working_dir: /workspace
    command: ["npm", "run", "dev", "--workspace", "@phpsage/web", "--", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 15s
    ports:
      - "5173:5173"

  api-docs:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/openapi.yaml:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-lc"]
    command:
      - "ollama serve & until ollama pull \"${OLLAMA_MODEL:-llama3.2}\"; do echo 'waiting for ollama pull'; sleep 2; done; wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q \"${OLLAMA_MODEL:-llama3.2}\""]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 10s
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  qdrant-data:
  ollama-data:
